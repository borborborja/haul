# =============================================================================
# Docker Compose for Haul (pre-built image from GitHub Container Registry)
# =============================================================================
# Recommended way to deploy. Uses the image published by CI on every release.
#
# Usage:
#   docker compose -f docker-compose.hub.yml pull
#   docker compose -f docker-compose.hub.yml up -d
#
# Pin a version by setting SHOPLIST_IMAGE, e.g. ghcr.io/borborborja/haul:1.7.0
# =============================================================================

version: '3.8'

services:
  shoplist:
    image: ${SHOPLIST_IMAGE:-ghcr.io/borborborja/haul:latest}
    container_name: shoplist
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
    environment:
      # Instance admin (password-only login when ADMIN_PASSWORD is set)
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # Instance config (prevails over admin panel + locks the field when set)
      - SERVER_NAME=${SERVER_NAME:-}
      - ENABLE_WEB_APP=${ENABLE_WEB_APP:-}
      - ENABLE_USERNAMES=${ENABLE_USERNAMES:-}
      - REQUIRE_ACCOUNT=${REQUIRE_ACCOUNT:-}
      - REGISTRATION_OPEN=${REGISTRATION_OPEN:-}
      # SMTP Configuration (optional, for email verification)
      - SMTP_ENABLED=${SMTP_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_SENDER_NAME=${SMTP_SENDER_NAME:-ShoppingList}
      - SMTP_SENDER_ADDRESS=${SMTP_SENDER_ADDRESS:-noreply@example.com}

volumes:
  pb_data:
