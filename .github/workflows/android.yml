name: Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'android/**'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: android

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" > /dev/null

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Optional release signing: set KEYSTORE_BASE64, KEYSTORE_PASSWORD,
      # KEY_ALIAS, KEY_PASSWORD as repo secrets to produce a signed release APK.
      # Without them, an installable debug-signed APK is published instead.
      - name: Configure signing
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/release.jks
            printf 'storeFile=release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\nstoreType=pkcs12\n' \
              "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > app/keystore.properties
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Build signed release APKs (phone + watch)
        if: steps.signing.outputs.signed == 'true'
        run: ./gradlew :app:assembleRelease :wear:assembleRelease --no-daemon

      # Compile-only check when no signing secrets are available (e.g. fork PRs).
      # This APK is NEVER published — it would carry a non-deterministic debug key.
      - name: Compile check (no signing secrets — not published)
        if: steps.signing.outputs.signed == 'false'
        run: ./gradlew :app:assembleDebug :wear:assembleDebug --no-daemon

      # Only the signed release APK is ever distributed, so every published Haul
      # APK is signed with the SAME key and installs as an in-place update.
      - name: Collect signed release APKs
        id: apk
        if: steps.signing.outputs.signed == 'true'
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" ! -name "*unsigned*" | head -1)
          if [ -z "$APK" ]; then echo "No signed phone APK found" >&2; exit 1; fi
          OUT="Haul-${GITHUB_REF_NAME:-manual}.apk"
          cp "$APK" "$OUT"
          echo "path=android/$OUT" >> "$GITHUB_OUTPUT"
          WEAR=$(find wear/build/outputs/apk/release -name "*.apk" ! -name "*unsigned*" | head -1)
          if [ -n "$WEAR" ]; then
            WOUT="Haul-wear-${GITHUB_REF_NAME:-manual}.apk"
            cp "$WEAR" "$WOUT"
            echo "wearpath=android/$WOUT" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.signed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.wearpath }}
          generate_release_notes: true
          fail_on_unmatched_files: false

      - name: Upload APK artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.signed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Haul-apk
          path: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.wearpath }}
