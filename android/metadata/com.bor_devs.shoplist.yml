AutoName: ShoppingList
Summary: Collaborative shopping list with offline-first sync

Description: |
    A fast, offline-first shopping list built in native Kotlin and Jetpack
    Compose. Plan at home, shop in the store, and share lists in real time
    with anyone you want — using your own self-hosted PocketBase server,
    or a fully local mode with no server at all.

    The app only talks to the PocketBase server you configure. No analytics,
    no tracking, no third-party SDKs.

